# Default values for microservice chart
replicaCount: 2

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

probes:
  # Startup probe gives slow-starting containers time to initialise
  # before liveness kicks in (failureThreshold * periodSeconds = max startup time)
  startup:
    enabled: true
    path: /health
    port: 3000
    failureThreshold: 30   # 30 * 5s = 90s max startup window
    periodSeconds: 5
    timeoutSeconds: 3
  liveness:
    enabled: true
    path: /health
    port: 3000
    initialDelaySeconds: 0  # startup probe handles the delay
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    enabled: true
    path: /ready
    port: 3000
    initialDelaySeconds: 0
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

env: []
# - name: ENV_VAR_NAME
#   value: "value"

envFrom: []
# - configMapRef:
#     name: my-config
# - secretRef:
#     name: my-secret

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

# PodDisruptionBudget — ensures at least 1 pod stays up during node drain / rolling update
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# NetworkPolicy — restricts inbound traffic to same namespace + monitoring namespace
networkPolicy:
  enabled: true

ingress:
  enabled: false
  className: alb
  annotations: {}
  hosts: []
  tls: []
